<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1100" height="540" rx="16" fill="#0a0a0b"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 z" fill="#6366f1"/>
    </marker>
  </defs>
  <text x="40" y="48" fill="#ededed" font-size="24" font-weight="800">Architektur</text>
  <text x="40" y="74" fill="#8b8b94" font-size="14">Next.js (App Router) · React 19 · Tailwind v4 · Prisma · SQLite — als installierbare PWA</text>

  <!-- Client -->
  <g transform="translate(40,110)">
    <rect width="300" height="380" rx="14" fill="#101019" stroke="#2a2a31"/>
    <text x="20" y="34" fill="#6366f1" font-size="14" font-weight="800">CLIENT (PWA)</text>
    <g font-size="13" fill="#ededed">
      <rect x="20" y="52" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="79">Server Components (RSC)</text>
      <rect x="20" y="106" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="133">Client-Komponenten (DnD, Charts)</text>
      <rect x="20" y="160" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="187">Web App Manifest · Standalone</text>
      <rect x="20" y="214" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="241">recharts · lucide · @dnd-kit</text>
      <rect x="20" y="268" width="260" height="92" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="294" fill="#8b8b94" font-size="12">Bewegungs-Demos (Bilder)</text>
      <text x="34" y="314" fill="#ededed">free-exercise-db</text>
      <text x="34" y="334" fill="#8b8b94" font-size="12">via jsDelivr CDN (gemeinfrei)</text>
    </g>
  </g>

  <!-- Server -->
  <g transform="translate(400,110)">
    <rect width="300" height="380" rx="14" fill="#101019" stroke="#2a2a31"/>
    <text x="20" y="34" fill="#6366f1" font-size="14" font-weight="800">SERVER (Next.js)</text>
    <g font-size="13" fill="#ededed">
      <rect x="20" y="52" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="79">Server Actions ("use server")</text>
      <rect x="20" y="106" width="260" height="74" rx="10" fill="#141417" stroke="#6366f1" stroke-opacity="0.5"/>
      <text x="34" y="130" font-weight="700">Coach-Engine (deterministisch)</text>
      <text x="34" y="150" fill="#8b8b94" font-size="12">1RM (Epley/Brzycki), RPE→RIR,</text>
      <text x="34" y="168" fill="#8b8b94" font-size="12">Doppelprogression, Deload, Plan-KI</text>
      <rect x="20" y="190" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="217">Auth (Sessions, scrypt-Hash)</text>
      <rect x="20" y="244" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="271">Provisionierung (Katalog/Vorlagen)</text>
      <rect x="20" y="298" width="260" height="62" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="322">Auto-Update</text>
      <text x="34" y="342" fill="#8b8b94" font-size="12">pull → migrate → build → reload</text>
    </g>
  </g>

  <!-- Data -->
  <g transform="translate(760,110)">
    <rect width="300" height="380" rx="14" fill="#101019" stroke="#2a2a31"/>
    <text x="20" y="34" fill="#6366f1" font-size="14" font-weight="800">DATEN</text>
    <g font-size="13" fill="#ededed">
      <rect x="20" y="52" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="79">Prisma ORM (typsicher)</text>
      <rect x="20" y="106" width="260" height="44" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="133">better-sqlite3 Adapter</text>
      <rect x="20" y="160" width="260" height="78" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="184">SQLite-Datei</text>
      <text x="34" y="204" fill="#8b8b94" font-size="12">Migrationen werden beim Update</text>
      <text x="34" y="222" fill="#8b8b94" font-size="12">automatisch deployt</text>
      <rect x="20" y="248" width="260" height="112" rx="10" fill="#141417" stroke="#2a2a31"/>
      <text x="34" y="272" fill="#8b8b94" font-size="12">Pro Nutzer getrennt:</text>
      <text x="34" y="294">· eigener Übungskatalog</text>
      <text x="34" y="314">· Vorlagen &amp; Coach-Programme</text>
      <text x="34" y="334">· Workouts, Sätze, Rekorde</text>
    </g>
  </g>

  <!-- arrows -->
  <line x1="340" y1="300" x2="398" y2="300" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="300" x2="758" y2="300" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
</svg>
