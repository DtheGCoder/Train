<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101019"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(64,96)">
    <rect width="128" height="128" rx="28" fill="#6366f1"/>
    <g fill="#ffffff">
      <rect x="29" y="45" width="9" height="38" rx="3"/>
      <rect x="38" y="51" width="9" height="26" rx="2"/>
      <rect x="47" y="58" width="34" height="12" rx="3"/>
      <rect x="81" y="51" width="9" height="26" rx="2"/>
      <rect x="90" y="45" width="9" height="38" rx="3"/>
    </g>
  </g>

  <!-- Title -->
  <text x="232" y="150" fill="#ededed" font-size="72" font-weight="800" letter-spacing="-1">Train</text>
  <text x="234" y="196" fill="#8b8b94" font-size="26" font-weight="500">Dein wissenschaftlicher Trainings-Coach – als installierbare PWA</text>

  <!-- Feature chips -->
  <g font-size="18" font-weight="600">
    <g transform="translate(234,226)">
      <rect width="196" height="40" rx="20" fill="#1c1c21" stroke="#2a2a31"/>
      <circle cx="24" cy="20" r="5" fill="#6366f1"/>
      <text x="40" y="26" fill="#ededed">Adaptiver Coach</text>
    </g>
    <g transform="translate(442,226)">
      <rect width="214" height="40" rx="20" fill="#1c1c21" stroke="#2a2a31"/>
      <circle cx="24" cy="20" r="5" fill="#22c55e"/>
      <text x="40" y="26" fill="#ededed">Mehrtägige Pläne</text>
    </g>
    <g transform="translate(668,226)">
      <rect width="206" height="40" rx="20" fill="#1c1c21" stroke="#2a2a31"/>
      <circle cx="24" cy="20" r="5" fill="#f59e0b"/>
      <text x="40" y="26" fill="#ededed">305 Übungen</text>
    </g>
    <g transform="translate(886,226)">
      <rect width="216" height="40" rx="20" fill="#1c1c21" stroke="#2a2a31"/>
      <circle cx="24" cy="20" r="5" fill="#ef4444"/>
      <text x="40" y="26" fill="#ededed">Live RPE-Steuerung</text>
    </g>
  </g>
</svg>
