<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="700" viewBox="0 0 1300 700" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="av" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="1300" height="700" fill="#08080a"/>

  <!-- ============ PHONE 1 — START ============ -->
  <g transform="translate(20,40)">
    <rect width="290" height="610" rx="38" fill="#000" stroke="#2a2a31" stroke-width="2"/>
    <rect x="12" y="12" width="266" height="586" rx="28" fill="#0a0a0b"/>
    <rect x="110" y="22" width="70" height="14" rx="7" fill="#000"/>

    <!-- header -->
    <text x="32" y="78" fill="#ededed" font-size="20" font-weight="800">Hallo, DtheG</text>
    <text x="32" y="98" fill="#8b8b94" font-size="12">Bereit fürs Training?</text>
    <circle cx="244" cy="80" r="20" fill="url(#av)" stroke="#2a2a31"/>
    <text x="244" y="85" fill="#ededed" font-size="13" font-weight="700" text-anchor="middle">DG</text>

    <!-- start button -->
    <rect x="32" y="120" width="226" height="52" rx="14" fill="#6366f1"/>
    <text x="145" y="152" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">▶  Freies Workout starten</text>

    <!-- stat cards -->
    <g transform="translate(32,188)">
      <rect width="108" height="74" rx="14" fill="#141417" stroke="#2a2a31"/>
      <text x="54" y="34" fill="#6366f1" font-size="22" font-weight="800" text-anchor="middle">12</text>
      <text x="54" y="56" fill="#8b8b94" font-size="11" text-anchor="middle">Workouts</text>
    </g>
    <g transform="translate(150,188)">
      <rect width="108" height="74" rx="14" fill="#141417" stroke="#2a2a31"/>
      <text x="54" y="34" fill="#ededed" font-size="20" font-weight="800" text-anchor="middle">8,4 t</text>
      <text x="54" y="56" fill="#8b8b94" font-size="11" text-anchor="middle">Volumen</text>
    </g>

    <text x="32" y="296" fill="#8b8b94" font-size="12" font-weight="700">LETZTE WORKOUTS</text>
    <g transform="translate(32,308)">
      <rect width="226" height="48" rx="12" fill="#141417" stroke="#2a2a31"/>
      <text x="14" y="22" fill="#ededed" font-size="13" font-weight="600">Push Day</text>
      <text x="14" y="38" fill="#8b8b94" font-size="11">6 Übungen · 4,1 t</text>
    </g>
    <g transform="translate(32,364)">
      <rect width="226" height="48" rx="12" fill="#141417" stroke="#2a2a31"/>
      <text x="14" y="22" fill="#ededed" font-size="13" font-weight="600">Leg Day</text>
      <text x="14" y="38" fill="#8b8b94" font-size="11">5 Übungen · 5,9 t</text>
    </g>

    <!-- bottom nav -->
    <rect x="12" y="546" width="266" height="52" rx="0" fill="#101013"/>
    <g fill="#6366f1"><circle cx="48" cy="572" r="4"/></g>
    <g fill="#8b8b94"><circle cx="104" cy="572" r="4"/><circle cx="160" cy="572" r="4"/><circle cx="216" cy="572" r="4"/></g>
  </g>
  <text x="165" y="678" fill="#8b8b94" font-size="14" font-weight="600" text-anchor="middle">Start · Profilbild oben rechts</text>

  <!-- ============ PHONE 2 — COACH-PLAN ============ -->
  <g transform="translate(340,40)">
    <rect width="290" height="610" rx="38" fill="#000" stroke="#2a2a31" stroke-width="2"/>
    <rect x="12" y="12" width="266" height="586" rx="28" fill="#0a0a0b"/>
    <rect x="110" y="22" width="70" height="14" rx="7" fill="#000"/>

    <!-- coach plan card -->
    <rect x="24" y="56" width="242" height="510" rx="18" fill="#10101a" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="40" y="86" fill="#6366f1" font-size="11" font-weight="700">DEIN COACH-PLAN</text>
    <text x="40" y="108" fill="#ededed" font-size="17" font-weight="800">Push/Pull/Legs 6×</text>
    <g transform="translate(180,74)">
      <rect width="74" height="22" rx="11" fill="#141417"/>
      <text x="37" y="15" fill="#8b8b94" font-size="10" text-anchor="middle">Durchlauf 2</text>
    </g>

    <!-- day done -->
    <g transform="translate(40,124)">
      <rect width="210" height="50" rx="12" fill="#0f0f12" stroke="#2a2a31"/>
      <circle cx="22" cy="25" r="9" fill="none" stroke="#22c55e" stroke-width="2"/>
      <path d="M18 25 l3 3 l6 -7" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="40" y="22" fill="#8b8b94" font-size="13" font-weight="600" text-decoration="line-through">Push A</text>
      <text x="40" y="38" fill="#8b8b94" font-size="10">Brust · 5 Übungen</text>
    </g>
    <!-- day current -->
    <g transform="translate(40,182)">
      <rect width="210" height="84" rx="12" fill="#141417" stroke="#6366f1"/>
      <circle cx="22" cy="26" r="9" fill="none" stroke="#6366f1" stroke-width="2"/>
      <circle cx="22" cy="26" r="3.5" fill="#6366f1"/>
      <text x="40" y="23" fill="#ededed" font-size="13" font-weight="700">Pull A</text>
      <g transform="translate(150,16)"><rect width="52" height="18" rx="9" fill="#6366f1"/><text x="26" y="13" fill="#fff" font-size="9" font-weight="800" text-anchor="middle">NÄCHSTES</text></g>
      <text x="40" y="39" fill="#8b8b94" font-size="10">Breite · 5 Übungen</text>
      <rect x="14" y="50" width="182" height="24" rx="8" fill="#6366f1"/>
      <text x="105" y="66" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">▶  Diesen Tag starten</text>
    </g>
    <!-- day future -->
    <g transform="translate(40,274)">
      <rect width="210" height="50" rx="12" fill="#0f0f12" stroke="#2a2a31"/>
      <circle cx="22" cy="25" r="9" fill="none" stroke="#3a3a44" stroke-width="2"/>
      <text x="40" y="22" fill="#ededed" font-size="13" font-weight="600">Legs A</text>
      <text x="40" y="38" fill="#8b8b94" font-size="10">Kniebeuge · 5 Übungen</text>
    </g>

    <!-- coach log -->
    <g transform="translate(40,338)">
      <rect width="210" height="210" rx="12" fill="#0f0f12" stroke="#2a2a31"/>
      <text x="14" y="24" fill="#ededed" font-size="12" font-weight="700">Was der Coach angepasst hat</text>
      <g transform="translate(14,40)">
        <path d="M0 8 l5 -6 l5 6" fill="none" stroke="#22c55e" stroke-width="2"/>
        <text x="16" y="6" fill="#cfcfd6" font-size="10">Bankdrücken: Wdh hoch</text>
        <text x="16" y="19" fill="#cfcfd6" font-size="10">auf 9 (Ziel 8–12).</text>
      </g>
      <g transform="translate(14,86)">
        <path d="M0 2 l5 6 l5 -6" fill="none" stroke="#f59e0b" stroke-width="2"/>
        <text x="16" y="6" fill="#cfcfd6" font-size="10">Kniebeuge: Plateau –</text>
        <text x="16" y="19" fill="#cfcfd6" font-size="10">Gewicht zurück auf 95 kg.</text>
      </g>
      <g transform="translate(14,132)">
        <circle cx="5" cy="5" r="5" fill="none" stroke="#6366f1" stroke-width="2"/>
        <text x="16" y="6" fill="#cfcfd6" font-size="10">Seitheben → frische</text>
        <text x="16" y="19" fill="#cfcfd6" font-size="10">Variante getauscht.</text>
      </g>
      <g transform="translate(14,178)">
        <circle cx="5" cy="5" r="5" fill="none" stroke="#38bdf8" stroke-width="2"/>
        <text x="16" y="6" fill="#cfcfd6" font-size="10">Deload-Woche eingelegt.</text>
      </g>
    </g>
  </g>
  <text x="485" y="678" fill="#8b8b94" font-size="14" font-weight="600" text-anchor="middle">Coach-Plan · Step-by-Step + Selbstanpassung</text>

  <!-- ============ PHONE 3 — WORKOUT ============ -->
  <g transform="translate(660,40)">
    <rect width="290" height="610" rx="38" fill="#000" stroke="#2a2a31" stroke-width="2"/>
    <rect x="12" y="12" width="266" height="586" rx="28" fill="#0a0a0b"/>
    <rect x="110" y="22" width="70" height="14" rx="7" fill="#000"/>

    <!-- timer + finish -->
    <text x="32" y="76" fill="#ededed" font-size="16" font-weight="800">Push Day</text>
    <text x="32" y="94" fill="#8b8b94" font-size="11">⏱ 24:18</text>

    <!-- rest timer pill -->
    <rect x="150" y="62" width="108" height="34" rx="17" fill="#1c1c21" stroke="#6366f1"/>
    <text x="204" y="84" fill="#6366f1" font-size="13" font-weight="700" text-anchor="middle">Pause  1:12</text>

    <!-- exercise card -->
    <rect x="24" y="110" width="242" height="220" rx="14" fill="#141417" stroke="#2a2a31"/>
    <text x="40" y="138" fill="#ededed" font-size="13" font-weight="700">Bankdrücken (LH)</text>
    <circle cx="226" cy="133" r="9" fill="none" stroke="#8b8b94" stroke-width="1.5"/>
    <text x="226" y="138" fill="#8b8b94" font-size="12" font-weight="800" text-anchor="middle">i</text>
    <text x="40" y="154" fill="#8b8b94" font-size="10">Brust</text>

    <!-- set rows -->
    <g transform="translate(40,166)">
      <rect width="210" height="30" rx="8" fill="#1c1c21"/>
      <text x="12" y="20" fill="#8b8b94" font-size="11">1</text>
      <text x="60" y="20" fill="#ededed" font-size="11">60 kg</text>
      <text x="120" y="20" fill="#ededed" font-size="11">8 Wdh</text>
      <circle cx="194" cy="15" r="9" fill="#22c55e"/>
      <path d="M190 15 l3 3 l6 -7" fill="none" stroke="#0a0a0b" stroke-width="2"/>
    </g>
    <g transform="translate(40,202)">
      <rect width="210" height="30" rx="8" fill="#1c1c21"/>
      <text x="12" y="20" fill="#8b8b94" font-size="11">2</text>
      <text x="60" y="20" fill="#ededed" font-size="11">60 kg</text>
      <text x="120" y="20" fill="#ededed" font-size="11">8 Wdh</text>
      <circle cx="194" cy="15" r="9" fill="#22c55e"/>
      <path d="M190 15 l3 3 l6 -7" fill="none" stroke="#0a0a0b" stroke-width="2"/>
    </g>
    <g transform="translate(40,238)">
      <rect width="210" height="30" rx="8" fill="#0f0f12" stroke="#2a2a31"/>
      <text x="12" y="20" fill="#8b8b94" font-size="11">3</text>
      <text x="60" y="20" fill="#8b8b94" font-size="11">— kg</text>
      <text x="120" y="20" fill="#8b8b94" font-size="11">— Wdh</text>
      <circle cx="194" cy="15" r="9" fill="none" stroke="#3a3a44" stroke-width="2"/>
    </g>
    <rect x="40" y="278" width="210" height="30" rx="8" fill="none" stroke="#2a2a31" stroke-dasharray="4 4"/>
    <text x="145" y="298" fill="#8b8b94" font-size="11" text-anchor="middle">+ Satz hinzufügen</text>

    <!-- coach card -->
    <rect x="24" y="346" width="242" height="96" rx="14" fill="#10101a" stroke="#6366f1" stroke-opacity="0.5"/>
    <text x="40" y="372" fill="#6366f1" font-size="11" font-weight="800">COACH</text>
    <text x="40" y="394" fill="#ededed" font-size="13" font-weight="700">Nächster Satz: 62,5 kg × 8</text>
    <text x="40" y="414" fill="#8b8b94" font-size="11">Ziel-RPE 8 · 2 Wdh in Reserve.</text>
    <text x="40" y="430" fill="#8b8b94" font-size="11">Tempo: 2 s runter, explosiv hoch.</text>

    <!-- finish button -->
    <rect x="24" y="500" width="242" height="46" rx="12" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e"/>
    <text x="145" y="528" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">⚑  Workout beenden</text>
  </g>
  <text x="805" y="678" fill="#8b8b94" font-size="14" font-weight="600" text-anchor="middle">Live-Workout · Coach &amp; Pausentimer</text>

  <!-- ============ PHONE 4 — BESTENLISTE ============ -->
  <g transform="translate(980,40)">
    <rect width="290" height="610" rx="38" fill="#000" stroke="#2a2a31" stroke-width="2"/>
    <rect x="12" y="12" width="266" height="586" rx="28" fill="#0a0a0b"/>
    <rect x="110" y="22" width="70" height="14" rx="7" fill="#000"/>

    <text x="32" y="80" fill="#ededed" font-size="20" font-weight="800">Bestenliste</text>

    <!-- podium 2-1-3 -->
    <!-- place 2 -->
    <g transform="translate(40,150)">
      <circle cx="35" cy="20" r="22" fill="url(#av)" stroke="#cbd5e1" stroke-width="2"/>
      <text x="35" y="25" fill="#ededed" font-size="13" font-weight="700" text-anchor="middle">AL</text>
      <text x="35" y="62" fill="#ededed" font-size="11" font-weight="700" text-anchor="middle">Alex</text>
      <text x="35" y="76" fill="#6366f1" font-size="10" font-weight="700" text-anchor="middle">1.840</text>
      <rect x="8" y="84" width="54" height="48" rx="6" fill="#cbd5e1" fill-opacity="0.15"/>
      <text x="35" y="114" fill="#cbd5e1" font-size="16" font-weight="800" text-anchor="middle">2</text>
    </g>
    <!-- place 1 -->
    <g transform="translate(108,120)">
      <text x="35" y="6" fill="#f59e0b" font-size="16" text-anchor="middle">♛</text>
      <circle cx="35" cy="34" r="26" fill="url(#av)" stroke="#f59e0b" stroke-width="2"/>
      <text x="35" y="40" fill="#ededed" font-size="14" font-weight="800" text-anchor="middle">DG</text>
      <text x="35" y="78" fill="#ededed" font-size="12" font-weight="800" text-anchor="middle">DtheG</text>
      <text x="35" y="93" fill="#6366f1" font-size="11" font-weight="800" text-anchor="middle">2.310</text>
      <rect x="6" y="102" width="58" height="68" rx="6" fill="#f59e0b" fill-opacity="0.2"/>
      <text x="35" y="146" fill="#f59e0b" font-size="20" font-weight="800" text-anchor="middle">1</text>
    </g>
    <!-- place 3 -->
    <g transform="translate(176,162)">
      <circle cx="35" cy="20" r="20" fill="url(#av)" stroke="#b45309" stroke-width="2"/>
      <text x="35" y="25" fill="#ededed" font-size="12" font-weight="700" text-anchor="middle">JO</text>
      <text x="35" y="58" fill="#ededed" font-size="11" font-weight="700" text-anchor="middle">Jo</text>
      <text x="35" y="72" fill="#6366f1" font-size="10" font-weight="700" text-anchor="middle">1.520</text>
      <rect x="10" y="80" width="50" height="36" rx="6" fill="#b45309" fill-opacity="0.2"/>
      <text x="35" y="106" fill="#d97706" font-size="15" font-weight="800" text-anchor="middle">3</text>
    </g>

    <!-- list -->
    <text x="32" y="332" fill="#8b8b94" font-size="12" font-weight="700">RANGLISTE</text>
    <g transform="translate(32,344)">
      <rect width="226" height="50" rx="12" fill="#141417" stroke="#6366f1" stroke-opacity="0.4"/>
      <text x="14" y="30" fill="#8b8b94" font-size="12" font-weight="700">1</text>
      <circle cx="44" cy="25" r="14" fill="url(#av)"/>
      <text x="44" y="29" fill="#ededed" font-size="10" font-weight="700" text-anchor="middle">DG</text>
      <text x="68" y="22" fill="#ededed" font-size="12" font-weight="700">DtheG (du)</text>
      <text x="68" y="37" fill="#8b8b94" font-size="10">12 Workouts · 8,4 t</text>
      <text x="212" y="30" fill="#6366f1" font-size="13" font-weight="800" text-anchor="end">2.310</text>
    </g>
    <g transform="translate(32,402)">
      <rect width="226" height="50" rx="12" fill="#141417" stroke="#2a2a31"/>
      <text x="14" y="30" fill="#8b8b94" font-size="12" font-weight="700">2</text>
      <circle cx="44" cy="25" r="14" fill="url(#av)"/>
      <text x="44" y="29" fill="#ededed" font-size="10" font-weight="700" text-anchor="middle">AL</text>
      <text x="68" y="22" fill="#ededed" font-size="12" font-weight="700">Alex</text>
      <text x="68" y="37" fill="#8b8b94" font-size="10">10 Workouts · 7,1 t</text>
      <text x="212" y="30" fill="#6366f1" font-size="13" font-weight="800" text-anchor="end">1.840</text>
    </g>
    <g transform="translate(32,460)">
      <rect width="226" height="50" rx="12" fill="#141417" stroke="#2a2a31"/>
      <text x="14" y="30" fill="#8b8b94" font-size="12" font-weight="700">3</text>
      <circle cx="44" cy="25" r="14" fill="url(#av)"/>
      <text x="44" y="29" fill="#ededed" font-size="10" font-weight="700" text-anchor="middle">JO</text>
      <text x="68" y="22" fill="#ededed" font-size="12" font-weight="700">Jo</text>
      <text x="68" y="37" fill="#8b8b94" font-size="10">9 Workouts · 6,0 t</text>
      <text x="212" y="30" fill="#6366f1" font-size="13" font-weight="800" text-anchor="end">1.520</text>
    </g>
  </g>
  <text x="1125" y="678" fill="#8b8b94" font-size="14" font-weight="600" text-anchor="middle">Bestenliste · mit Profilbildern</text>
</svg>
