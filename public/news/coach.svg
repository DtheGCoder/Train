<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13131c"/><stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="20" fill="url(#cg)"/>
  <text x="40" y="58" fill="#ededed" font-size="30" font-weight="800">🧠 Smarter Coach</text>
  <text x="40" y="86" fill="#8b8b94" font-size="16">Denkt übergreifend: Wochenvolumen, Bereitschaft &amp; PR-Prognose.</text>

  <!-- volume bars -->
  <g transform="translate(40,120)">
    <text x="0" y="0" fill="#8b8b94" font-size="13" font-weight="700">Wochenvolumen je Muskel</text>
    <g transform="translate(0,16)" font-size="12">
      <text x="0" y="14" fill="#ededed">Brust</text>
      <rect x="70" y="6" width="280" height="10" rx="5" fill="#1c1c21"/>
      <rect x="155" y="6" width="100" height="10" fill="#22c55e" opacity="0.2"/>
      <rect x="70" y="6" width="110" height="10" rx="5" fill="#22c55e"/>
      <text x="360" y="14" fill="#22c55e" font-size="11" font-weight="700">optimal</text>
    </g>
    <g transform="translate(0,42)" font-size="12">
      <text x="0" y="14" fill="#ededed">Rücken</text>
      <rect x="70" y="6" width="280" height="10" rx="5" fill="#1c1c21"/>
      <rect x="165" y="6" width="100" height="10" fill="#22c55e" opacity="0.2"/>
      <rect x="70" y="6" width="42" height="10" rx="5" fill="#ef4444"/>
      <text x="360" y="14" fill="#ef4444" font-size="11" font-weight="700">zu wenig</text>
    </g>
    <g transform="translate(0,68)" font-size="12">
      <text x="0" y="14" fill="#ededed">Bauch</text>
      <rect x="70" y="6" width="280" height="10" rx="5" fill="#1c1c21"/>
      <rect x="120" y="6" width="120" height="10" fill="#22c55e" opacity="0.2"/>
      <rect x="70" y="6" width="270" height="10" rx="5" fill="#ef4444"/>
      <text x="360" y="14" fill="#ef4444" font-size="11" font-weight="700">zu viel</text>
    </g>
  </g>

  <!-- readiness gauge + PR -->
  <g transform="translate(470,120)">
    <rect width="290" height="78" rx="14" fill="#141417" stroke="#2a2a31"/>
    <text x="16" y="26" fill="#22c55e" font-size="14" font-weight="700">❤ Bereitschaft: Erholt</text>
    <rect x="16" y="38" width="258" height="9" rx="4.5" fill="#1c1c21"/>
    <rect x="16" y="38" width="220" height="9" rx="4.5" fill="#6366f1"/>
    <text x="16" y="64" fill="#8b8b94" font-size="11">Heute darfst du Vollgas geben.</text>
  </g>
  <g transform="translate(470,210)">
    <rect width="290" height="70" rx="14" fill="#141417" stroke="#2a2a31"/>
    <text x="16" y="26" fill="#a5b4fc" font-size="14" font-weight="700">🚀 PR-Prognose</text>
    <text x="16" y="48" fill="#ededed" font-size="13">Bankdrücken → <tspan font-weight="800">100 kg</tspan></text>
    <text x="16" y="64" fill="#8b8b94" font-size="11">in ~4 Einheiten bei deinem Tempo</text>
  </g>
</svg>
