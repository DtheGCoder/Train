<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13131c"/><stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="20" fill="url(#ng)"/>
  <text x="40" y="58" fill="#ededed" font-size="30" font-weight="800">🍎 Ernährungs-Coach</text>
  <text x="40" y="86" fill="#8b8b94" font-size="16">Tagesziele aus deinem Profil &amp; Training – abhaken, was du isst.</text>

  <!-- rings -->
  <g transform="translate(120,200)">
    <circle r="56" fill="none" stroke="#1c1c21" stroke-width="11"/>
    <circle r="56" fill="none" stroke="#6366f1" stroke-width="11" stroke-linecap="round" stroke-dasharray="352" stroke-dashoffset="120" transform="rotate(-90)"/>
    <text y="-4" fill="#ededed" font-size="24" font-weight="800" text-anchor="middle">2050</text>
    <text y="16" fill="#8b8b94" font-size="12" text-anchor="middle">/ 3190 kcal</text>
    <text y="84" fill="#ededed" font-size="14" font-weight="600" text-anchor="middle">Kalorien</text>
  </g>
  <g transform="translate(290,200)">
    <circle r="56" fill="none" stroke="#1c1c21" stroke-width="11"/>
    <circle r="56" fill="none" stroke="#22c55e" stroke-width="11" stroke-linecap="round" stroke-dasharray="352" stroke-dashoffset="88" transform="rotate(-90)"/>
    <text y="-4" fill="#ededed" font-size="24" font-weight="800" text-anchor="middle">120</text>
    <text y="16" fill="#8b8b94" font-size="12" text-anchor="middle">/ 160 g</text>
    <text y="84" fill="#ededed" font-size="14" font-weight="600" text-anchor="middle">Protein</text>
  </g>

  <!-- checklist -->
  <g transform="translate(440,130)">
    <rect width="320" height="150" rx="14" fill="#141417" stroke="#2a2a31"/>
    <g transform="translate(16,18)">
      <circle cx="13" cy="13" r="13" fill="#22c55e"/><path d="M7 13 l4 4 l8 -9" fill="none" stroke="#fff" stroke-width="2"/>
      <text x="38" y="12" fill="#8b8b94" font-size="14" font-weight="600" text-decoration="line-through">Frühstück</text>
      <text x="38" y="30" fill="#8b8b94" font-size="11">800 kcal · 40 g Eiweiß</text>
    </g>
    <g transform="translate(16,64)">
      <circle cx="13" cy="13" r="13" fill="none" stroke="#2a2a31" stroke-width="2"/>
      <text x="38" y="12" fill="#ededed" font-size="14" font-weight="600">Post-Workout-Shake</text>
      <text x="38" y="30" fill="#8b8b94" font-size="11">nach dem Training</text>
    </g>
    <g transform="translate(16,110)">
      <circle cx="13" cy="13" r="13" fill="none" stroke="#2a2a31" stroke-width="2"/>
      <text x="38" y="12" fill="#ededed" font-size="14" font-weight="600">Kreatin <tspan fill="#a5b4fc">3–5 g</tspan></text>
      <text x="38" y="30" fill="#8b8b94" font-size="11">täglich</text>
    </g>
  </g>
</svg>
